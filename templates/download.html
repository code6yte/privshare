{% extends "base.html" %}
{% block title %}Download | PrivShare{% endblock %}
{% block content %}
<section class="card narrow">
    <p class="file-label">Protected file</p>
    <p class="file-name">{{ filename }}</p>
    <p class="hint" style="margin-bottom:1.25rem;">Enter the password shared by the uploader to decrypt and download.</p>

    <form action="{{ url_for('download_file', token=token) }}" method="post" class="form">
        <label>
            Password
            <input type="password" name="password" required autofocus>
        </label>
        <button type="submit">Decrypt &amp; Download</button>
    </form>

    <p class="hint">The link alone is not enough. A password is required for decryption.</p>
</section>
{% endblock %}
