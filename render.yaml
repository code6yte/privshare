services:
  - type: web
    name: privshare
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_EXPIRY_HOURS
        value: 24
      - key: MAX_CONTENT_LENGTH_MB
        value: 32
