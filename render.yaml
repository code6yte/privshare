services:
  - type: web
    name: privshare
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_EXPIRY_HOURS
        value: 24
      - key: MAX_CONTENT_LENGTH_MB
        value: 32
